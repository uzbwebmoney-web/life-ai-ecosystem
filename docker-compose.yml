services:
  life-ai-bot:
    build: .
    container_name: life-ai-ecosystem
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import app.main; print('ok')\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
